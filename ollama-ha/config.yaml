name: "Ollama-HA"
slug: "ollama-ha"
version: "0.2.4"
description: "Run Ollama LLM server locally on your Home Assistant instance."
url: "https://github.com/darcy-buttrose/ollama-ha"
startup: services
init: false
image: ghcr.io/darcy-buttrose/{arch}-ollama-ha
arch:
  - amd64
  - aarch64
ports:
  11434/tcp: 11434
host_network: true
panel_icon: mdi:brain
video: true

options:
  gpu: false
  start_auth: false
  env_vars: []
schema:
  gpu: bool
  start_auth: bool
  env_vars:
    - name: str
      value: str

environment:
  HOME: "/data"
  OLLAMA_HOST: "0.0.0.0:11434"

map:
  - share:rw
